<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos</title>
    <link rel="stylesheet" href="./css/produto.css" />
  </head>
  <body>
    <header>
      <h1>Gerenciar Produtos</h1>
    </header>
    <button id="btnVoltar">Voltar</button>
    <section id="cards">
      <section>
        <form id="formP">
          <div id="cadastroP">
            <label for="nome"
              >Nome do Produto:
              <input
                type="text"
                name="nome"
                id="nome"
                placeholder="Digite o Nome do Produto"
                required
            /></label>

            <label for="preco"
              >Preço do Produto:
              <input
                type="number"
                step="0.01"
                min="0.01"
                name="preco"
                id="preco"
                placeholder="Digite o Preço do Produto"
                required
            /></label>

            <label for="categoria"
              >Categoria:
              <input
                type="text"
                name="categoria"
                id="categoria"
                placeholder="Digite a Categoria do Produto"
                required
            /></label>

            <label for="quantidade"
              >Quantidade:
              <input
                type="number"
                min="1"
                name="quantidade"
                id="quantidade"
                placeholder="Digite a Quantidade"
                required
            /></label>

            <button type="submit" id="btnAdicionar">Adicionar Produto</button>
          </div>
        </form>
      </section>

      <section id="pCadastrados">
        <h2>Produtos Cadastrados</h2>
        <div id="produtos">
          
        </div>
      </section>
    </section>
    <footer>
        &copy; Joao Pedro
    </footer>
    <script src="./js/produtos.js"></script>
  </body>
</html>
